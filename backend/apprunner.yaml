version: 1.0
  runtime: nodejs22

  build:
    commands:
      pre-build:
        - npm install -g bun
        - bun install --frozen-lockfile
      build:
        - bunx prisma generate
        - bun run build

  run:
    runtime-version: 22
    command: npx prisma migrate deploy && node dist/main
    network:
      port: 3001
    env:
      - name: NODE_ENV
        value: production